<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="wallet-container">
            <h2 class="text-center mb-4 fw-bold text-primary">Enviar Dinero</h2>
            
            <input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar contacto o alias...">
            <ul id="listaAgenda" class="list-group mb-3">
                <li class="list-group-item contacto-item">Juan Perez (Alias: juan.p)</li>
                <li class="list-group-item contacto-item">Maria Gomez (Alias: mari.go)</li>
            </ul>

            <button id="btnMostrarFormulario" class="btn btn-outline-primary w-100 mb-3 fw-bold">+ Agregar nuevo contacto</button>

            <form id="formNuevoContacto" class="bg-light p-3 rounded mb-3" style="display:none;">
                <h6 class="fw-bold mb-3">Nuevo Contacto</h6>
                <input type="text" id="nuevoNombre" class="form-control mb-2" placeholder="Nombre completo" required>
                <input type="text" id="nuevoCBU" class="form-control mb-2" placeholder="CBU (22 dígitos numéricos)" required>
                <input type="text" id="nuevoAlias" class="form-control mb-3" placeholder="Alias" required>
                <button type="submit" class="btn btn-success btn-sm w-100 mb-2">Guardar</button>
                <button type="button" id="btnCancelarFormulario" class="btn btn-secondary btn-sm w-100">Cancelar</button>
            </form>

            <form id="formEnvio" style="display:none;" class="mb-3 border p-3 rounded">
                <h6 id="contactoSeleccionadoTexto" class="text-primary fw-bold"></h6>
                <div class="input-group mb-3">
                    <span class="input-group-text">$</span>
                    <input type="number" id="montoEnvio" class="form-control" placeholder="Monto" min="1" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Enviar Dinero</button>
            </form>

            <div id="msjConfirmacion" class="mb-3"></div>

            <a href="menu.html" class="btn btn-light w-100 py-2 text-secondary fw-bold">Volver al Menú Principal</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>
</html>
