<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="wallet-container">
            <h2 class="text-center mb-4 fw-bold text-primary">Depositar</h2>
            
            <div id="alert-container"></div>

            <form id="formDeposito">
                <div class="mb-4">
                    <p class="text-secondary fw-bold">Tu saldo actual es: <span id="saldoMostrado" class="text-primary"></span></p>
                    
                    <label for="monto" class="form-label text-muted">Monto a depositar</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light">$</span>
                        <input type="number" class="form-control" id="monto" placeholder="0.00" min="1" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold">Realizar depósito</button>
            </form>
            
            <div id="leyendaDeposito" class="text-center mb-3"></div>
            
            <a href="menu.html" class="btn btn-light w-100 py-2 text-secondary fw-bold">Volver al Menú Principal</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>
</html>
