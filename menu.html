<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="wallet-container">
            <h2 class="text-center mb-4 fw-bold text-primary">Menú Principal</h2>
            
            <div id="alert-container"></div> <div class="balance-card">
                <h5>Saldo Actual</h5>
                <h3 id="saldoPantalla">$ 0,00</h3>
            </div>
            
            <div class="d-grid gap-3">
                <button id="btnDepositar" class="btn btn-outline-primary py-2 fw-bold">Depositar</button>
                <button id="btnEnviar" class="btn btn-outline-success py-2 fw-bold">Enviar Dinero</button>
                <button id="btnMovimientos" class="btn btn-outline-secondary py-2 fw-bold">Últimos Movimientos</button>
            </div>

            <div class="text-center mt-4">
                <a href="login.html" class="text-danger fw-bold text-decoration-none">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>
</html>
